sentence=Captive-portal Wi-Fi provisioning library for ESP32 and ESP8266.
paragraph=SmartProv enables any ESP32 or ESP8266 device to be configured over a mobile-friendly captive portal — no companion app required. Features include multi-network fallback, dynamic custom form fields, persistent flash storage (NVS on ESP32, EEPROM on ESP8266), factory reset via hardware button, LED status indication, and a clean state-machine architecture. A modern alternative to WiFiManager.
